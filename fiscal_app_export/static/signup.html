<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Herramienta Fiscal Cripto</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080c12;
  --surface: #10141e;
  --surf2:   #1a1f2e;
  --border:  rgba(255,255,255,0.09);
  --text:    #eef0f6;
  --muted:   #7a8099;
  --accent:  #00C896;
  --red-dim: rgba(226,75,74,0.10);
  --red-brd: rgba(226,75,74,0.22);
  --ff-h:    'Syne', sans-serif;
  --ff-b:    'DM Sans', sans-serif;
}

html, body {
  min-height: 100%; background: var(--bg);
  font-family: var(--ff-b); color: var(--text);
  overflow-x: hidden;
}

/* ── FLOATING SHAPES ── */
.bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.shape { position: absolute; animation: floatUp linear infinite; }
@keyframes floatUp {
  0%   { transform: translateY(0)     rotate(0deg); }
  50%  { transform: translateY(-28px) rotate(180deg); }
  100% { transform: translateY(0)     rotate(360deg); }
}

/* ── LAYOUT ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1rem;
}

/* ── BRAND ── */
.brand {
  font-family: var(--ff-h); font-size: 1rem; font-weight: 700;
  letter-spacing: -0.02em; color: var(--text); text-decoration: none;
  margin-bottom: 1.4rem;
}
.brand em { color: var(--accent); font-style: normal; }

/* ── CARD ── */
.card {
  background: rgba(16,20,30,0.96);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  width: 100%; max-width: 440px;
  padding: 2.5rem 2.25rem 2.25rem;
  box-shadow: 0 32px 80px rgba(0,0,0,0.55);
}
.card-title {
  font-family: var(--ff-h); font-size: 2.1rem; font-weight: 800;
  letter-spacing: -0.04em; margin-bottom: 0.35rem;
}
.card-sub {
  color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; line-height: 1.5;
}

/* ── GOOGLE BUTTON ── */
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px 20px;
  background: #ffffff; border: none; border-radius: 12px;
  color: #1a1a2e; font-family: var(--ff-b); font-size: 0.92rem; font-weight: 600;
  text-decoration: none; cursor: pointer; transition: background 0.15s, box-shadow 0.15s;
}
.btn-google:hover { background: #f0f2f5; box-shadow: 0 6px 24px rgba(0,0,0,0.3); }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  margin: 1.25rem 0;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── FORM ── */
.field { margin-bottom: 1rem; }
.field label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.field input {
  width: 100%; background: var(--surf2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: var(--ff-b);
  font-size: 15px; padding: 13px 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field input::placeholder { color: #3d4560; }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,200,150,0.12);
}
.field-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

/* ── ERROR ── */
.form-error {
  background: var(--red-dim); border: 1px solid var(--red-brd);
  border-radius: 10px; padding: 10px 14px;
  font-size: 13px; color: #d9a5a4; margin-bottom: 1rem;
}

/* ── SUBMIT ── */
.btn-submit {
  width: 100%; padding: 14px; margin-top: 0.25rem;
  background: var(--accent); color: #080c12;
  border: none; border-radius: 12px;
  font-family: var(--ff-h); font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  letter-spacing: -0.01em;
}
.btn-submit:hover { opacity: 0.9; }
.btn-submit:active { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── LEGAL ── */
.legal {
  font-size: 11.5px; color: var(--muted); line-height: 1.5;
  text-align: center; margin-top: 1rem;
}
.legal a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }

/* ── FOOTER ── */
.card-footer {
  text-align: center; margin-top: 1.6rem;
  font-size: 14px; color: var(--muted);
}
.card-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
.card-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="bg-shapes" id="bgShapes"></div>

<div class="page">
  <a href="/" class="brand">mariano<em>sevilla</em>.com</a>

  <div class="card">
    <h1 class="card-title">Únete</h1>
    <p class="card-sub">Crea tu cuenta gratis y genera tu informe fiscal.</p>

    <!-- Google OAuth -->
    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </a>

    <div class="divider">o</div>

    <form id="signupForm" novalidate>
      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" name="email"
               autocomplete="email" placeholder="tu@email.com" required>
      </div>
      <div class="field">
        <label for="regPass">Contraseña</label>
        <input type="password" id="regPass" name="password"
               autocomplete="new-password" placeholder="••••••••"
               required minlength="8">
        <p class="field-hint">Mínimo 8 caracteres.</p>
      </div>
      <div class="form-error" id="regError" hidden></div>
      <button type="submit" class="btn-submit" id="regBtn">Crear cuenta</button>
    </form>

    <p class="legal">
      Al crear tu cuenta aceptas nuestros
      <a href="/legal/terminos">Términos de servicio</a> y
      <a href="/legal/privacidad">Política de privacidad</a>.
    </p>

    <p class="card-footer">¿Ya tienes cuenta? <a href="/login/">Iniciar sesión</a></p>
  </div>
</div>

<script>
// ── Floating background shapes ──────────────────
(function () {
  const host    = document.getElementById('bgShapes');
  const palette = ['#00C896','#00bfff','#a78bfa','#fb923c','#f43f5e','#facc15'];
  const kinds   = ['circle', 'diamond', 'rect'];
  for (let i = 0; i < 24; i++) {
    const el   = document.createElement('div');
    const kind = kinds[i % kinds.length];
    const size = 11 + Math.random() * 22;
    const col  = palette[Math.floor(Math.random() * palette.length)];
    const x    = Math.random() * 100;
    const y    = Math.random() * 100;
    const dur  = 7 + Math.random() * 11;
    const del  = -(Math.random() * 10);
    let css    = `position:absolute;left:${x}%;top:${y}%;opacity:.13;`
               + `animation:floatUp ${dur}s ${del}s linear infinite;`;
    if (kind === 'circle')
      css += `width:${size}px;height:${size}px;border-radius:50%;background:${col};`;
    else if (kind === 'diamond')
      css += `width:${size}px;height:${size}px;background:${col};transform:rotate(45deg);`;
    else
      css += `width:${size * 1.4}px;height:${size * 0.7}px;background:${col};border-radius:3px;`;
    el.style.cssText = css;
    host.appendChild(el);
  }
})();

// ── Redirect if already logged in ───────────────
(async () => {
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    const d = await r.json();
    if (d.user) { window.location.replace('/fiscal'); return; }
  } catch {}

  // Show OAuth error if redirected back with error param
  const err = new URLSearchParams(location.search).get('error');
  if (err) {
    const el = document.getElementById('regError');
    el.textContent = 'Error al crear cuenta con Google. Prueba con email y contraseña.';
    el.hidden = false;
  }
})();

// ── Signup form ─────────────────────────────────
const form    = document.getElementById('signupForm');
const errorEl = document.getElementById('regError');
const btn     = document.getElementById('regBtn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  errorEl.hidden = true;
  btn.disabled   = true;
  btn.textContent = 'Un momento…';
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('regEmail').value.trim().toLowerCase(),
        password: document.getElementById('regPass').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al crear la cuenta');
    window.location.href = '/fiscal';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.hidden      = false;
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Crear cuenta';
  }
});
</script>
</body>
</html>
